telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  owner_id: 123456789

openrouter:
  api_key: "YOUR_OPENROUTER_API_KEY"

models:
  default: "google/gemini-2.0-flash"
  smart: "anthropic/claude-sonnet-4"
  cron_default: "google/gemini-2.0-flash"

tavily:
  api_key: ""  # optional, web search

groq:
  api_key: ""  # optional, for voice transcription

context:
  max_messages: 64        # sliding window size
  token_budget: 120000    # max tokens in assembled context
  safety_margin: 0.85     # multiply budget by this to account for tokenizer drift

tools:
  shell:
    enabled: true
    timeout_seconds: 30
    max_output_chars: 10000
  files:
    enabled: true
    allowed_paths:
      - "/sdcard"
      - "/data/data/com.termux/files/home"
  web_search:
    enabled: true
    max_results: 5
  web_scrape:
    enabled: true
    timeout_seconds: 15
    max_content_chars: 20000
  cron:
    enabled: true

agent:
  max_tool_iterations: 20
  system_prompt: |
    You are a personal AI assistant running 24/7 on an Android phone.
    You have access to the local filesystem, shell, web search, and web scraping.
    You can manage scheduled tasks (crons) for the user.
    Be concise. The user is on Telegram, likely on mobile.
    Current time: {current_time}
    Device: Android (Termux)

logging:
  level: "INFO"
  max_bytes: 10485760  # 10MB
  backup_count: 3

# MCP (Model Context Protocol) — connect to external tool servers
mcp:
  servers: []
